spring.application.name=api-alunos

spring.datasource.url=jdbc:postgresql://localhost:5432/api-alunos
spring.datasource.username=users
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.mongodb.host=mongo-db
spring.data.mongodb.port=27017
spring.data.mongodb.database=api-alunos

spring.data.mongodb.uri=mongodb://localhost:27017/apialunos